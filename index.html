<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --border: #2a2f45;
      --card-hover: #1e2235;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      padding: 56px 0 48px;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 100px;
      padding: 5px 16px;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e8eaf0 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 8px 0 40px;
    }

    /* Section label */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,142,247,0.06), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      background: var(--card-hover);
      border-color: rgba(79,142,247,0.4);
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(79,142,247,0.2), rgba(124,92,252,0.2));
      border: 1px solid rgba(79,142,247,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 100px;
      padding: 3px 10px;
      align-self: flex-start;
    }

    .card-arrow {
      align-self: flex-end;
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
    }

    .card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Placeholder card */
    .card-placeholder {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.85rem;
      min-height: 160px;
      text-align: center;
    }

    .card-placeholder .plus {
      font-size: 28px;
      opacity: 0.4;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    /* Animate in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.5s ease both; }
    .section-label { animation: fadeUp 0.5s 0.1s ease both; }
    .card:nth-child(1) { animation: fadeUp 0.5s 0.15s ease both; }
    .card:nth-child(2) { animation: fadeUp 0.5s 0.2s ease both; }
    .card:nth-child(3) { animation: fadeUp 0.5s 0.25s ease both; }
    .card:nth-child(4) { animation: fadeUp 0.5s 0.3s ease both; }
    .card-placeholder { animation: fadeUp 0.5s 0.35s ease both; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">Providien Thermoforming</div>
      <h1>Training Hub</h1>
      <p class="subtitle">Interactive tools and exercises for employee development.</p>
    </header>

    <div class="divider"></div>

    <div class="section-label">Available Modules</div>

    <div class="grid">

      <!-- CARD 1: Edit the href, title, desc, and tag for each artifact -->
      <a class="card" href="5-whys-practice.html">
        <div class="card-icon">🔍</div>
        <div class="card-title">5 Whys Practice</div>
        <div class="card-desc">Root cause analysis exercise for identifying the source of problems.</div>
        <div class="card-tag">Problem Solving</div>
        <div class="card-arrow">→</div>
      </a>

      <!-- CARD 2: Duplicate this block for each new artifact you add -->
      <!-- <a class="card" href="your-file-name.html">
        <div class="card-icon">📋</div>
        <div class="card-title">Your Module Title</div>
        <div class="card-desc">Short description of what this module covers.</div>
        <div class="card-tag">Category</div>
        <div class="card-arrow">→</div>
      </a> -->

      <div class="card-placeholder">
        <div class="plus">+</div>
        More modules coming soon
      </div>

    </div>
  </div>

  <footer>
    <div class="container">Providien Thermoforming &nbsp;·&nbsp; Training &amp; Development</div>
  </footer>
</body>
</html>
