<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 Whys Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:  #1A3A5C;
    --teal:  #007E85;
    --teal2: #00A8B0;
    --off:   #F4F7FA;
    --gray1: #E2EAF0;
    --gray2: #94A3B8;
    --green: #16A34A;
    --w1: #B91C1C; --w2: #D97706; --w3: #CA8A04; --w4: #3D8B37; --w5: #16A34A;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--off); color: var(--navy);
    padding: 1.25rem 1.5rem 1.5rem; line-height: 1.5;
  }
  .tool-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.1rem;
  }
  .tool-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 900; color: var(--navy);
  }
  .tool-title span { color: var(--teal2); }
  .reset-btn {
    padding: 0.28rem 0.8rem; background: transparent;
    border: 1.5px solid var(--gray1); border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em;
    color: var(--gray2); cursor: pointer; text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--teal2); color: var(--teal); }
  .problem-row {
    display: flex; align-items: flex-start; gap: 0.65rem;
    background: var(--navy); border-radius: 7px;
    padding: 0.7rem 0.9rem; margin-bottom: 1.25rem;
  }
  .prob-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    color: var(--teal2); text-transform: uppercase;
    white-space: nowrap; padding-top: 4px;
  }
  .prob-input {
    flex: 1; background: transparent; border: none;
    border-bottom: 1.5px solid rgba(255,255,255,0.2);
    color: white; font-family: 'Barlow', sans-serif;
    font-size: 0.88rem; padding: 0.1rem 0;
    resize: none; min-height: 24px; overflow: hidden; outline: none;
  }
  .prob-input::placeholder { color: rgba(255,255,255,0.35); font-style: italic; }
  .prob-input:focus { border-bottom-color: var(--teal2); }
  .whys-chain { display: flex; flex-direction: column; }
  .why-row {
    display: grid; grid-template-columns: 72px 1fr;
    gap: 0 0.7rem; align-items: stretch;
  }
  .why-left { display: flex; flex-direction: column; align-items: center; }
  .why-badge {
    width: 64px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem; font-weight: 700; color: white; border-radius: 4px; flex-shrink: 0;
  }
  .why-connector {
    width: 2px; flex: 1; min-height: 6px;
    background: var(--gray1); margin: 0 auto;
  }
  .why-connector.last { background: transparent; }
  .why-right { padding-bottom: 9px; }
  .why-q { font-size: 0.7rem; color: var(--gray2); font-style: italic; margin-bottom: 3px; }
  .why-input {
    width: 100%; padding: 0.48rem 0.75rem;
    border: 1.5px solid var(--gray1); border-radius: 5px;
    font-family: 'Barlow', sans-serif; font-size: 0.88rem; color: var(--navy);
    background: white; resize: none; min-height: 34px; overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .why-input:focus { outline: none; border-color: var(--teal2); box-shadow: 0 0 0 3px rgba(0,168,176,0.12); }
  .why-input.filled { border-color: var(--teal); }
  .why-input.root   { background: #F0FDF4; border-color: var(--green); color: #15803D; font-weight: 600; }
  .submit-row { margin-top: 0.9rem; display: flex; align-items: center; gap: 0.6rem; }
  .submit-btn {
    padding: 0.48rem 1.25rem; background: var(--teal); color: white; border: none;
    border-radius: 5px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer; text-transform: uppercase; transition: background 0.15s, opacity 0.15s;
  }
  .submit-btn:hover { background: var(--teal2); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-note { font-size: 0.74rem; color: var(--gray2); font-style: italic; }
  .feedback-block {
    border-radius: 6px; padding: 0.8rem 1rem; margin-top: 0.75rem;
    display: none; font-size: 0.84rem;
    animation: fadeIn 0.25s ease;
  }
  .feedback-block.show { display: block; }
  .feedback-block.good    { background: #F0FDF4; border: 1px solid #BBF7D0; color: #15803D; }
  .feedback-block.partial { background: #FFF7ED; border: 1px solid #FED7AA; color: #92400E; }
  .fb-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<div class="tool-header">
  <div class="tool-title">5 Whys <span>Practice</span></div>
  <button class="reset-btn" onclick="resetAll()">&#8635; Reset</button>
</div>

<div class="problem-row">
  <div class="prob-label">Problem</div>
  <textarea class="prob-input" id="prob-input" rows="1" placeholder="Describe the problem here&hellip;" oninput="autoExpand(this)"></textarea>
</div>

<div class="whys-chain">
  <div class="why-row">
    <div class="why-left">
      <div class="why-badge" style="background:var(--w1);">Why 1</div>
      <div class="why-connector"></div>
    </div>
    <div class="why-right">
      <div class="why-q">Why did this happen?</div>
      <textarea class="why-input" id="i1" rows="1" placeholder="Type your answer&hellip;" oninput="onType(this,1)"></textarea>
    </div>
  </div>
  <div class="why-row">
    <div class="why-left">
      <div class="why-badge" style="background:var(--w2);">Why 2</div>
      <div class="why-connector"></div>
    </div>
    <div class="why-right">
      <div class="why-q">Why did that happen?</div>
      <textarea class="why-input" id="i2" rows="1" placeholder="Type your answer&hellip;" oninput="onType(this,2)"></textarea>
    </div>
  </div>
  <div class="why-row">
    <div class="why-left">
      <div class="why-badge" style="background:var(--w3);">Why 3</div>
      <div class="why-connector"></div>
    </div>
    <div class="why-right">
      <div class="why-q">Why did that condition exist?</div>
      <textarea class="why-input" id="i3" rows="1" placeholder="Type your answer&hellip;" oninput="onType(this,3)"></textarea>
    </div>
  </div>
  <div class="why-row">
    <div class="why-left">
      <div class="why-badge" style="background:var(--w4);">Why 4</div>
      <div class="why-connector"></div>
    </div>
    <div class="why-right">
      <div class="why-q">Why wasn't it caught or prevented?</div>
      <textarea class="why-input" id="i4" rows="1" placeholder="Type your answer&hellip;" oninput="onType(this,4)"></textarea>
    </div>
  </div>
  <div class="why-row">
    <div class="why-left">
      <div class="why-badge" style="background:var(--w5);">Why 5</div>
      <div class="why-connector last"></div>
    </div>
    <div class="why-right">
      <div class="why-q">What is the root cause? (the systemic gap)</div>
      <textarea class="why-input" id="i5" rows="1" placeholder="Root cause&hellip;" oninput="onType(this,5)"></textarea>
    </div>
  </div>
</div>

<div class="submit-row">
  <button class="submit-btn" id="submit-btn" onclick="submitChain()" disabled>Review My Chain</button>
  <span class="submit-note" id="submit-note">Fill all 5 Whys to review</span>
</div>

<div class="feedback-block" id="feedback"></div>

<script>
  function autoExpand(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
  function onType(el, n) {
    autoExpand(el);
    var filled = el.value.trim().length > 0;
    el.classList.toggle('filled', filled && n < 5);
    el.classList.toggle('root',   filled && n === 5);
    updateSubmit();
    document.getElementById('feedback').classList.remove('show');
  }
  function updateSubmit() {
    var allFilled = [1,2,3,4,5].every(function(n){ return document.getElementById('i'+n).value.trim().length > 0; });
    document.getElementById('submit-btn').disabled = !allFilled;
    document.getElementById('submit-note').textContent = allFilled ? 'Review your chain below' : 'Fill all 5 Whys to review';
  }
  function submitChain() {
    var vals = [1,2,3,4,5].map(function(n){ return document.getElementById('i'+n).value.trim(); });
    var avg = vals.reduce(function(a,b){ return a + b.length; }, 0) / vals.length;
    var fb = document.getElementById('feedback');
    if (avg >= 15) {
      fb.className = 'feedback-block show good';
      fb.innerHTML = '<div class="fb-title">&#10004; Chain complete &mdash; now test it</div><div>Read your answers from Why 1 to Why 5. Does each answer logically explain the previous one? Your Why 5 should point to something you can actually fix: a procedure gap, a missing checklist, a training requirement, or a system change.</div>';
    } else {
      fb.className = 'feedback-block show partial';
      fb.innerHTML = '<div class="fb-title">Dig a little deeper</div><div>Some answers look brief. Be specific &mdash; instead of &ldquo;equipment issue,&rdquo; describe exactly what failed and why. The more precise each answer, the more useful your root cause will be.</div>';
    }
    fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function resetAll() {
    document.getElementById('prob-input').value = '';
    document.getElementById('prob-input').style.height = '';
    [1,2,3,4,5].forEach(function(n){
      var el = document.getElementById('i'+n);
      el.value = ''; el.style.height = ''; el.className = 'why-input';
    });
    updateSubmit();
    document.getElementById('feedback').classList.remove('show');
  }
</script>
</body>
</html>
